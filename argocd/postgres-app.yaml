apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    # Quelle 1: Bitnami Helm Chart direkt
    - repoURL: https://charts.bitnami.com/bitnami
      chart: postgresql
      targetRevision: "15.5.35"
      helm:
        valueFiles:
          - $values/apps/postgres/values.yaml

    # Quelle 2: Dein Git-Repo – nur für values.yaml
    - repoURL: https://github.com/ThomasPolzer/gitops-postgresql.git
      targetRevision: main
      ref: values                    # Alias $values zeigt auf dieses Repo

  destination:
    server: https://kubernetes.default.svc
    namespace: postgres

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true