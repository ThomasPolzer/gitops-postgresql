apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/ThomasPolzer/gitops-postgresql.git
    targetRevision: master
    path: apps/postgres
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: postgres

  syncPolicy:
    automated:
      prune: true       # Ressourcen werden gelöscht wenn sie aus Git entfernt werden
      selfHeal: true    # Manuelle Cluster-Änderungen werden automatisch zurückgesetzt
    syncOptions:
      - CreateNamespace=true